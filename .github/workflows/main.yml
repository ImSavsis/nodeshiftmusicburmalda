name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install react-native-svg --legacy-peer-deps

      - name: Hardcode Track Player Plugin
        run: |
          TARGET_DIR="node_modules/react-native-track-player/lib/src"
          if [ -d "$TARGET_DIR" ]; then
            cp "$TARGET_DIR/trackPlayer" "$TARGET_DIR/trackPlayer.js" 2>/dev/null || true
          fi

          PLUGIN_PATH="node_modules/react-native-track-player/app.plugin.js"
          cat << 'EOF' > "$PLUGIN_PATH"
          const { withInfoPlist } = require('@expo/config-plugins');
          module.exports = function(config) {
            return withInfoPlist(config, (config) => {
              if (!config.modResults.UIBackgroundModes) {
                config.modResults.UIBackgroundModes = [];
              }
              if (!config.modResults.UIBackgroundModes.includes('audio')) {
                config.modResults.UIBackgroundModes.push('audio');
              }
              return config;
            });
          };
          EOF

      - name: Fix Git state
        run: |
          git config --global user.email "bot@example.com"
          git config --global user.name "Builder Bot"
          git add .
          git commit -m "ci: fix track player and assets" || true

      - name: Fix Corrupted PNG Assets
        run: |
          find . -type f -iname "*.png" -exec sips -s format png {} --out {} \;

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: Build unsigned app
        run: |
          # Находим путь к .xcworkspace, игнорируя вложенные папки xcodeproj
          WORKSPACE_PATH=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          # Извлекаем имя схемы (имя файла без расширения)
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          
          echo "Building workspace: $WORKSPACE_PATH"
          echo "Detected scheme: $SCHEME_NAME"
          
          xcodebuild build \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData/Build/Products" -name "*.app" -type d | grep -v "\.xctest" | head -1)
          if [ -z "$APP_PATH" ]; then echo "Error: .app not found"; exit 1; fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr burmalda-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: burmalda-unsigned-ipa
          path: burmalda-unsigned.ipa
