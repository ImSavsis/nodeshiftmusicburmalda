name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install react-native-svg --legacy-peer-deps

      - name: Compatibility Patch (No deletions)
        run: |
          # 1. Заставляем Node.js понимать import/export
          python3 -c "
          import json, os
          if os.path.exists('package.json'):
              with open('package.json', 'r') as f:
                  data = json.load(f)
              data['type'] = 'module'
              with open('package.json', 'w') as f:
                  json.dump(data, f, indent=2)
          "
          
          # 2. Исправляем битый путь в самом плеере
          TARGET="node_modules/react-native-track-player/lib/src"
          if [ -d "$TARGET" ]; then
            cp "$TARGET/trackPlayer" "$TARGET/trackPlayer.js" 2>/dev/null || true
          fi

      - name: Fix Git state
        run: |
          git config --global user.email "bot@example.com"
          git config --global user.name "Builder Bot"
          git add .
          git commit -m "ci: compatibility mode" || true

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: Build unsigned app
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -type d | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData/Build/Products" -name "*.app" -type d | grep -v "\.xctest" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr burmalda-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: burmalda-unsigned-ipa
          path: burmalda-unsigned.ipa
