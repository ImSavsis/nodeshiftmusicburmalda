name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean and Install
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          npm install react-native-svg --legacy-peer-deps

      - name: Patch Track Player (Config Plugin Fix)
        run: |
          # Фиксим основной вход плагина, если он есть
          PLUGIN_PATH="node_modules/react-native-track-player/app.plugin.js"
          if [ -f "$PLUGIN_PATH" ]; then
            echo "Patching Config Plugin..."
            # Заменяем импорты на реквайры, чтобы Node не ныла
            sed -i '' "s/import/const/g" "$PLUGIN_PATH" || true
            sed -i '' "s/export default/module.exports =/g" "$PLUGIN_PATH" || true
          fi
          
          # Фиксим index.js, который вызывал ошибку ранее
          INDEX_PATH="node_modules/react-native-track-player/lib/src/index.js"
          if [ -f "$INDEX_PATH" ]; then
            sed -i '' "s/from '.\/trackPlayer'/from '.\/trackPlayer.js'/g" "$INDEX_PATH" || true
          fi

      - name: Fix Git state
        run: |
          git config --global user.email "bot@example.com"
          git config --global user.name "Builder Bot"
          git add .
          git commit -m "ci: fix plugins" || true

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: Build unsigned app
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -type d | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData/Build/Products" -name "*.app" -type d | grep -v "\.xctest" | head -1)
          if [ -z "$APP_PATH" ]; then echo "ERROR: .app not found"; exit 1; fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr burmalda-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: burmalda-unsigned-ipa
          path: burmalda-unsigned.ipa
          retention-days: 30
