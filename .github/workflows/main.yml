name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install react-native-svg --legacy-peer-deps

      - name: Remove broken Config Plugin
        run: |
          # Вырезаем плагин из app.json или app.config.json, чтобы Expo не пытался его загрузить
          if [ -f "app.json" ]; then
            cat app.json | jq 'del(.expo.plugins[] | select(. == "react-native-track-player" or .[0] == "react-native-track-player"))' > app.json.tmp && mv app.json.tmp app.json
            echo "Removed react-native-track-player from app.json plugins"
          fi

      - name: Fix Git state
        run: |
          git config --global user.email "bot@example.com"
          git config --global user.name "Builder Bot"
          git add .
          git commit -m "ci: remove broken plugin" || true

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: Build unsigned app
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -type d | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData/Build/Products" -name "*.app" -type d | grep -v "\.xctest" | head -1)
          if [ -z "$APP_PATH" ]; then echo "ERROR: .app not found"; exit 1; fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr burmalda-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: burmalda-unsigned-ipa
          path: burmalda-unsigned.ipa
          retention-days: 30
